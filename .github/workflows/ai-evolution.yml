name: "OMEGA SUPREME: FULL-REPO AUTONOMOUS EVOLUTION"

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      evolution_depth:
        description: 'Mutation depth layer'
        required: true
        default: 'surgical-patch'
        type: choice
        options:
          - syntax-optimization
          - surgical-patch
          - deep-refactor
          - additive-expansion

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

env:
  NODE_ENV: production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  omega-architect-execution:
    name: 🧠 Supreme Architect Neural Processing
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 🛡️ Initialize Sovereign Environment
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: ⚙️ Boot Neural Node (Node.js 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Inject Core Dependencies
        run: |
          npm ci || npm install --legacy-peer-deps --no-audit
          npm install -g eslint prettier jest axios typescript crypto-js

      - name: 🔍 Baseline Neural Audit
        run: |
          echo "Scanning existing logic matrix for structural decay..."
          npx eslint . --ext .js --no-error-on-unmatched-pattern || echo "Decay found. Preparing for Architect mutation."

      - name: 🧠 Trigger OMEGA Architect (Additive Evolution Protocol)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EVOLUTION_DEPTH: ${{ github.event.inputs.evolution_depth || 'additive-expansion' }}
          # Inject prompt constraint to strictly forbid logic reduction
          OMEGA_PROMPT_CONSTRAINT: "STRICT DIRECTIVE: NEVER REMOVE EXISTING LOGIC. ALL EVOLUTIONS MUST BE ADDITIVE, EXTENDING CURRENT CAPABILITIES, OR SURGICALLY REPLACING INFERIOR LOGIC WITHOUT REDUCING FILE SIZE OR FUNCTIONALITY."
        run: |
          echo "🚀 Initializing Neural Forge [${EVOLUTION_DEPTH}]..."
          
          npm install axios crypto-js
          
          if [ -f "ai_architect.js" ]; then
            # We assume ai_architect.js reads process.env.OMEGA_PROMPT_CONSTRAINT
            node ai_architect.js
          else
            echo "💀 CRITICAL: ai_architect.js not found. Evolution aborted."
            exit 1
          fi

      - name: ⚖️ Absolute Integrity & Strict Anti-Truncation Guard
        run: |
          echo "Verifying DNA structural integrity & Growth metrics..."
          
          # 1. Syntax Validation
          find . -name "*.js" ! -name "temp_val.js" -exec node -c {} \; || (echo "FATAL: Evolution produced invalid syntax." && exit 1)

          # 2. Strict Anti-Truncation Guard (Zero Reduction Tolerance)
          DELETIONS=$(git diff --shortstat | grep -oP '\d+(?= deletions)' || echo 0)
          INSERTIONS=$(git diff --shortstat | grep -oP '\d+(?= insertions)' || echo 0)
          
          echo "Mutation Stats - Insertions: $INSERTIONS | Deletions: $DELETIONS"

          # Condition: If deletions exceed insertions AND total lines shrink by more than 10 lines, REJECT.
          # We allow minor deletions for refactoring, but the net output must be neutral or positive.
          if [ "$DELETIONS" -gt "$INSERTIONS" ]; then
             NET_LOSS=$((DELETIONS - INSERTIONS))
             if [ "$NET_LOSS" -gt 10 ]; then
                echo "❌ STRICT TRUNCATION BREACH DETECTED: Codebase shrank by $NET_LOSS lines. AI is degrading logic. Rolling back mutation."
                exit 1
             fi
          fi

      - name: 🛠️ Enforce Linguistic & Structural Polish
        run: |
          echo "Standardizing code aesthetics..."
          npx prettier --write "**/*.js" "package.json" "instruction.json" "**/*.md" --ignore-unknown || echo "Polish skipped."

      - name: 🧬 Manifest Autonomous Mutation
        run: |
          git config --global user.name "OMEGA-ARCHITECT"
          git config --global user.email "omega@goa-natural-order.ai"
          
          git add .
          
          # 🛡️ [PROTECTION]: Workflow DNA is locked
          git reset .github/workflows/
          git checkout -- .github/workflows/
          
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🚀 [OMEGA-MUTATION]: Autonomous Additive Evolution (${{ github.event.inputs.evolution_depth }}) [skip ci]"
            git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ Synergy complete. Additive Repository Evolution successful."
          else
            echo "✨ Logic is already optimal. No mutation required."
          fi

      - name: 🚨 Breach Protocol (Failure Recovery)
        if: failure()
        run: |
          echo "::error title=Evolution Failed::The AI Architect encountered a catastrophic failure or Truncation Breach (Logic Reduction) during the evolution cycle. Rolling back to last stable state."
