name: 🌌 OMEGA Swarm Node Execution (Stage 10 Agentic)

on:
  schedule:
    # ⏱️ 20 မိနစ် တစ်ခါ Auto Run ရန် (Cron Syntax)
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      force_evolution:
        description: "Force Deep Neural Evolution Cycle"
        required: false
        type: boolean
        default: false

concurrency:
  # 🛡️ ကွန်ရက်ထဲမှာ Node တစ်ခုတည်း ပြိုင်တူ Run ပြီး ရှုပ်ထွေးမှုမဖြစ်စေရန် ထိန်းချုပ်ခြင်း
  group: omega-swarm-cluster
  cancel-in-progress: false

jobs:
  agentic_execution:
    name: 🤖 Execute Swarm Agent Logic
    runs-on: ubuntu-latest
    timeout-minutes: 15 # ⏳ Loop တွေ အပတ်လွန်ပြီး API လောင်သွားတာမျိုး မဖြစ်အောင် 15 မိနစ် Limit ထားခြင်း

    steps:
      - name: 📥 Clone Neural Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # 🔑 ကုဒ်ကို အလိုအလျောက် Update (Push) လုပ်နိုင်ရန် Token
          fetch-depth: 0

      - name: 🛠️ Initialize Node.js Super-Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22' # ⚡ အမြန်ဆုံးနှင့် အငြိမ်ဆုံး Version 20 ကို သုံးမည်

      - name: 📦 Install Swarm Dependencies
        run: |
          echo "⚙️ Injecting required dependencies for Autonomous Agents..."
          npm install axios @supabase/supabase-js pg ioredis bullmq @octokit/rest firebase-admin dotenv
          
      - name: 🔐 Validate Cryptographic Integrity
        run: |
          if [ ! -f "delta_sync.js" ] && [ ! -f "cluster_sync.js" ]; then
            echo "❌ CRITICAL ERROR: Core JavaScript files missing."
            exit 1
          fi
          echo "✅ Integrity Check Passed. DNA is intact."

      - name: 🧠 Activate OMEGA Sovereign Logic (Execution)
        env:
          # 🔐 API Keys & Connections ကို GitHub Secrets ထဲမှ ဆွဲယူခြင်း
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEON_KEY: ${{ secrets.NEON_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SATNOGS_TOKEN: ${{ secrets.SATNOGS_TOKEN }}
        run: |
          echo "🚀 Initiating Stage 10 Agentic Protocol..."
          
          # 🔀 delta_sync.js ရှိပါက ၎င်းကို အရင် Run မည်။ မရှိပါက cluster_sync.js ကို Run မည်။
          if [ -f "delta_sync.js" ]; then
            echo "🌌 Detected delta_sync.js (Agentic Core). Booting..."
            node delta_sync.js
          elif [ -f "cluster_sync.js" ]; then
            echo "🌌 Detected cluster_sync.js (Fallback Core). Booting..."
            node cluster_sync.js
          fi

      - name: 🧬 Push Evolved Code to Hive (If Mutated)
        if: success()
        run: |
          echo "🔍 Checking for Post-Execution DNA Mutations..."
          git config --global user.name "Sovereign-Omega-Bot"
          git config --global user.email "omega-bot@goa-neurons.local"
          
          # ကုဒ်အပြောင်းအလဲ (Self-Evolution) ရှိမရှိ စစ်ဆေးခြင်း
          if [[ -n $(git status -s) ]]; then
            echo "⚠️ Structural changes detected. Uploading evolved DNA..."
            git add .
            git commit -m "🧬 [AUTO-EVOLUTION]: ASI Logic Upgraded via Stage 10 Agent Cycle"
            
            # API Limits သို့မဟုတ် Network ကြောင့် Push Fail ဖြစ်လျှင် သို့မဟုတ် အခြား Node တစ်ခုက ဉာဏ်ဦးသွားလျှင် Rebase လုပ်ပြီး ပြန်ကြိုးစားမည့် Loop
            n=0
            until [ "$n" -ge 3 ]
            do
               echo "🔄 Syncing with remote repository (Rebase)..."
               git pull --rebase origin main
               git push origin main && echo "✅ Push Successful." && break
               n=$((n+1)) 
               echo "⏳ Retrying push ($n/3)..."
               sleep 5
            done
          else
            echo "⚖️ Logic remains optimal. No evolutionary push required."
          fi
