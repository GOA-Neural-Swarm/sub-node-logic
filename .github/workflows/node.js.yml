name: Cluster Sub-node Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Rate Limit နှင့် Lock file error ကင်းဝေးစေရန် ၃၀ မိနစ်တစ်ခါ ပြောင်းထားသည်
  workflow_dispatch:      # Manual Run ရန်

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Git history အကုန်ယူရန် (Evolution အတွက် အရေးကြီးသည်)

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ❌ cache: 'npm' ကို ဖြုတ်ထားသည် (Dependencies lock file not found error ကို ဖြေရှင်းရန်)

      - name: Install Dependencies
        run: |
          npm install @octokit/rest firebase-admin axios @supabase/supabase-js pg
          # ပျောက်နေတတ်သော fs နှင့် child_process သည် node base တွင်ပါပြီးသားဖြစ်သည်

      - name: Configure Git for Evolution
        run: |
          git config --global user.name "Omega-Architect"
          git config --global user.email "omega@goa-natural-order.ai"

      - name: Execute Swarm Logic
        run: node cluster_sync.js
        env:
          # Database & Firebase Keys (Sudo Access Mode)
          NEON_KEY: ${{ secrets.NEON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

          # AI Evolution Token (ဒါထည့်မှ AI က code ပြင်ပေးမှာပါ)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

          # GitHub Authentication Tokens
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit & Push Evolved Code
        run: |
          git add .
          # အပြောင်းအလဲ ရှိမရှိ စစ်ဆေးပြီးမှသာ commit လုပ်ပါ
          if ! git diff-index --quiet HEAD --; then
            git commit -m "🧬 [EVOLVED]: Neural Brain Upgrade by AI"
            git push origin main
          else
            echo "No changes detected to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

# [Natural Order] Status: Synchronized, Shielded & Self-Evolving 🔱
