name: OMEGA HYBRID SUPREME (Absolute Evolution)

on:
  push:
    branches: [ evolution-lab ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

env:
  NODE_ENV: production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ================= JOB 1: SWARM EXECUTION & DIAGNOSIS =================
  audit-and-diagnose:
    name: 🧠 Swarm Diagnosis & Execution Phase
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Checkout Neural Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js Environment (Node 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Heavy-Duty Tool & Dependency Installation
        run: |
          npm install -g eslint prettier jest
          
          # Remove conflicting override from package.json to resolve EOVERRIDE
          sed -i '/"fast-xml-parser":/d' package.json || true
          
          npm install --force --legacy-peer-deps
          
          npm install @neondatabase/serverless@^0.10.4 \
                      @octokit/rest@^20.1.2 \
                      @supabase/supabase-js@^2.99.3 \
                      axios@^1.13.6 \
                      bullmq@^5.7.10 \
                      dotenv@^16.4.5 \
                      firebase-admin@^13.7.0 \
                      ioredis@^5.10.1 \
                      pg@^8.20.0 \
                      punycode@^2.3.1 \
                      fast-xml-parser@^4.4.1 \
                      @tootallnate/once@3.0.1

      - name: Structural Diagnosis (Linting & Logic Check)
        run: |
          npx eslint . --no-config-lookup --rule 'semi: error' || echo "WARNING: Structural flaws detected, proceeding to auto-repair."
          node -c cluster_sync.js && node -c delta_sync.js || (echo "ERROR: Logic compilation failed!" && exit 1)

      - name: Safety Guard (Vulnerability & Secret Scan)
        run: |
          npm audit fix --force || echo "🔱 WARNING: Managed Vulnerabilities via OMEGA."
          if grep -qE "AI_KEY|TOKEN|SECRET|PASSWORD" *.js; then
            echo "::warning title=Safety Guard::Potential hardcoded secret detected in the source code!"
          fi

      - name: Quality Superiority Inspection
        run: |
          git fetch origin main || true
          OLD_SIZE=$(git show origin/main:cluster_sync.js 2>/dev/null | wc -c || echo 0)
          NEW_SIZE=$(wc -c < cluster_sync.js)
          echo "Baseline: $OLD_SIZE bytes | Current: $NEW_SIZE bytes"
          
          if [ $NEW_SIZE -lt 500 ]; then 
            echo "ERROR: Code integrity check failed - Logic volume too low!"; exit 1; 
          fi
          
          LINE_COUNT=$(wc -l < cluster_sync.js)
          if [ $LINE_COUNT -gt 2000 ]; then 
            echo "WARNING: Logic bloat detected - code requires optimization."; 
          fi

      - name: Execute Swarm Logic (The Evolution Phase)
        run: |
          git config --global user.name "Omega-Architect"
          git config --global user.email "omega@goa-natural-order.ai"
          node cluster_sync.js
        env:
          NEON_KEY: ${{ secrets.NEON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SATNOGS_TOKEN: ${{ secrets.SATNOGS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Auto-Repair & Aesthetic Polish
        run: |
          npx prettier --write "**/*.js" "package.json" "instruction.json"
          echo "Logic repaired according to OMEGA standards."

  # ================= JOB 2: SOVEREIGN INSTALLATION (UNIVERSAL SYNC) =================
  sovereign-installation:
    name: 🧬 Sovereign Installation (Merge & Periodic Sync)
    needs: audit-and-diagnose
    runs-on: ubuntu-latest
    if: always() && needs.audit-and-diagnose.result == 'success'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: OMEGA-ULTIMA Universal Sovereign Sync & Conflict Resolution
        run: |
          # 1. Cleanup & Preparation
          rm -f trigger.lock
          git config --global user.name 'OMEGA-AUDITOR'
          git config --global user.email 'auditor@goa-natural-order.ai'
          git remote set-url origin "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"

          # 2. Lab Branch Integration (Syncing logic from evolution-lab)
          git fetch origin evolution-lab || true
          if git show-ref --verify --quiet refs/remotes/origin/evolution-lab; then
             git checkout origin/evolution-lab -- . || true
          fi

          # 3. Workflow Protection
          git reset HEAD .github/workflows/
          git checkout -- .github/workflows/

          # 4. Purge Zombie Workflows (Hard Delete Legacy Files)
          rm -f .github/workflows/Sovereign-sync.yml
          rm -f .github/workflows/evolution_engine.yml
          rm -f .github/workflows/manual_sync_debug.yml
          rm -f .github/workflows/SOVEREIGN_HYPER_AUTONOMOUS_LOOP.yml
          rm -f .github/workflows/evolution_lab.yml

          # 5. Smart Staging
          git add .

          # 6. Manifestation & Intelligent Rebase
          if ! git diff-index --quiet HEAD; then
            git commit -m "🚀 [BRAIN-EVOLUTION]: Neural Sync Success & Autonomous Evolution [skip ci]"
            
            # Fetch origin and rebase with strategy prioritizing current logic
            git fetch origin main
            git rebase -X ours origin/main || {
              echo "⚠️ Rebase step paused. Forcing resolution..."
              git add .
              git rebase --continue || git rebase --abort
            }
            
            # 7. Force Manifestation (Main)
            git push origin HEAD:main --force

            # 8. Evolution Lab Parity (Sync lab branch with main)
            git branch -D evolution-lab || true
            git checkout -b evolution-lab
            git push origin evolution-lab --force
            
            echo "🚀 [SUCCESS]: System state manifested with zero conflicts."
          else
            echo "✨ [OPTIMAL]: No mutations detected. System remains in supreme state."
          fi
